# Identificación del proyecto (ajustar a la convención del SonarQube de Comfama)
sonar.projectKey=baseline-front-comfama
sonar.projectName=baseline-front-comfama

# Fuentes y tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Exclusiones de análisis / cobertura
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts,src/main.tsx,**/*.d.ts

# Reporte de cobertura (generado por: npm run test:sonar / test:lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Reporte de ejecución de tests en formato JUnit (generado por: npm run test:junit)
sonar.testExecutionReportPaths=coverage/junit.xml

# Codificación
sonar.sourceEncoding=UTF-8
